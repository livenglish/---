<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Scoreboard</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #NEON_SCORE_ROOT {
      width: 100%;
      max-width: 700px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #1a0b2e 0%, #050510 100%);
      color: #fff;
      overflow: hidden;
      border-radius: 12px;
      box-sizing: border-box;
      user-select: none;
      padding: 20px;
    }

    .scoreboard {
      display: flex;
      gap: 20px;
      align-items: center;
      width: 100%;
      justify-content: space-around;
    }

    .player-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 15px;
      border: 1px solid rgba(188, 19, 254, 0.3);
      box-shadow: 0 0 15px rgba(188, 19, 254, 0.1);
      transition: box-shadow 0.3s ease;
      flex: 1;
      min-width: 120px;
    }

    .player-card:hover {
      box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
      border-color: rgba(0, 243, 255, 0.5);
    }

    input.player-name {
      background: transparent;
      border: none;
      border-bottom: 2px solid #bc13fe;
      color: #00f3ff;
      font-size: 1.2rem;
      text-align: center;
      width: 100%;
      outline: none;
      font-weight: bold;
      text-shadow: 0 0 5px #bc13fe;
      margin-bottom: 10px;
      transition: 0.3s;
    }
    
    input.player-name:focus {
      border-color: #00f3ff;
      text-shadow: 0 0 8px #00f3ff;
    }

    .score-display {
      font-size: 3.5rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe;
      margin: 10px 0;
      font-variant-numeric: tabular-nums;
      transition: transform 0.15s ease;
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    button {
      cursor: pointer;
      border: 2px solid #00f3ff;
      background: transparent;
      color: #00f3ff;
      font-size: 1.2rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
    }

    button:hover {
      background: #00f3ff;
      color: #000;
      box-shadow: 0 0 15px #00f3ff;
    }

    button:active {
      transform: scale(0.95);
    }

    button.btn-minus {
      border-color: #ff0055;
      color: #ff0055;
      box-shadow: 0 0 5px rgba(255, 0, 85, 0.2);
    }

    button.btn-minus:hover {
      background: #ff0055;
      color: #fff;
      box-shadow: 0 0 15px #ff0055;
    }

    .vs {
      font-size: 1.5rem;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.3);
      font-style: italic;
    }

    /* Центральная кнопка сброса */
    .center-reset {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }

    .reset-btn {
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      width: auto;
      height: auto;
      padding: 5px 20px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: none;
      background: transparent;
    }

    .reset-btn:hover {
      border-color: #fff;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="NEON_SCORE_ROOT">
    <div class="scoreboard">
      <div class="player-card">
        <input type="text" class="player-name" value="Игрок 1">
        <div class="score-display" id="score1">0</div>
        <div class="controls">
          <button class="btn-minus" onclick="changeScore(1, -1)">−</button>
          <button class="btn-plus" onclick="changeScore(1, 1)">+</button>
        </div>
      </div>

      <div class="vs">VS</div>

      <div class="player-card">
        <input type="text" class="player-name" value="Игрок 2">
        <div class="score-display" id="score2">0</div>
        <div class="controls">
          <button class="btn-minus" onclick="changeScore(2, -1)">−</button>
          <button class="btn-plus" onclick="changeScore(2, 1)">+</button>
        </div>
      </div>
    </div>

    <!-- Центральная кнопка сброса -->
    <div class="center-reset">
      <button class="reset-btn" onclick="resetScores()">Обнулить</button>
    </div>
  </div>

  <script>
    let scores = { p1: 0, p2: 0 };
    const scoreEl1 = document.getElementById('score1');
    const scoreEl2 = document.getElementById('score2');

    function changeScore(playerNum, delta) {
      if (playerNum === 1) {
        scores.p1 += delta;
        if (scores.p1 < 0) scores.p1 = 0;
        animateValue(scoreEl1, scores.p1);
      } else {
        scores.p2 += delta;
        if (scores.p2 < 0) scores.p2 = 0;
        animateValue(scoreEl2, scores.p2);
      }
    }

    function resetScores() {
      scores.p1 = 0;
      scores.p2 = 0;
      animateValue(scoreEl1, 0);
      animateValue(scoreEl2, 0);
    }

    // Анимация "дёргания" цифр
    function animateValue(element, value) {
      element.innerText = value;
      element.style.transform = "scale(1.2)";
      setTimeout(() => {
        element.style.transform = "scale(1)";
      }, 150);
    }
  </script>
</body>
</html>
